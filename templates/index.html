<!DOCTYPE html>
<html>
<head>
    <title>AI Bug Analyzer Pro</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        }

        .header {
            text-align: center;
            padding: 30px;
            color: white;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .upload-box {
            border: 2px dashed #4CAF50;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            border-radius: 10px;
        }

        .upload-box:hover {
            background: #f5f5f5;
        }

        button {
            margin-top: 20px;
            background: #4CAF50;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #388E3C;
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }

        pre {
            margin-top: 20px;
            background: #111;
            color: #00ffcc;
            padding: 15px;
            border-radius: 8px;
            max-height: 400px;
            overflow-y: auto;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>🤖 AI Bug Analyzer Pro</h1>
    <p>AI-powered root cause & defect analysis</p>
</div>

<div class="container">

    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
        📂 Click or Drag & Drop Bug File Here
    </div>

    <input type="file" id="fileInput" style="display:none">

    <div style="text-align:center;">
        <button onclick="analyze()">Analyze Bug</button>
    </div>

    <div class="loader" id="loader">🔍 Analyzing with AI...</div>

    <pre id="output"></pre>

</div>

<script>
    function analyze() {
        let file = document.getElementById("fileInput").files[0];

        if (!file) {
            alert("Please upload a file");
            return;
        }

        document.getElementById("loader").style.display = "block";

        let formData = new FormData();
        formData.append("file", file);

        fetch("/analyze", {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById("loader").style.display = "none";
            document.getElementById("output").innerText = data.result;
        });
    }
</script>

</body>
</html>
